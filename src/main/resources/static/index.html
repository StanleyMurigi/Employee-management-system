<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>Employee Management</h1>

    <div class="card">
        <h2 id="formTitle">Add New Employee</h2>
        <form id="employeeForm">
            <input type="hidden" id="employeeId">
            <div class="form-grid">
                <input type="text" id="firstName" placeholder="First Name" required>
                <input type="text" id="lastName" placeholder="Last Name" required>
                <input type="email" id="email" placeholder="Email" required>
                <input type="text" id="department" placeholder="Department" required>
                <input type="number" id="salary" placeholder="Salary" step="0.01" required>
            </div>
            <button type="submit" id="submitBtn">Save Employee</button>
            <button type="button" id="cancelBtn" style="display:none; background:#6c757d;">Cancel</button>
        </form>
        <div id="message"></div>
    </div>

    <div class="card">
        <h2>Employee List</h2>
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Department</th>
                <th>Salary</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody id="employeeTableBody">
            </tbody>
        </table>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
